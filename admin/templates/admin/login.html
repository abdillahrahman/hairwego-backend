<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admin Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        .login-card h2 {
            color: #fff;
            font-weight: 700;
            font-size: 1.75rem;
            margin-bottom: 8px;
            text-align: center;
        }
        .login-card .subtitle {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }
        .form-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #7c6cf0;
            box-shadow: 0 0 0 3px rgba(124, 108, 240, 0.25);
            color: #fff;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .btn-login {
            background: linear-gradient(135deg, #7c6cf0, #5b4dd4);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            padding: 12px;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #6b5ce0, #4a3dc3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 108, 240, 0.4);
            color: #fff;
        }
        .alert {
            border-radius: 12px;
            font-size: 0.85rem;
            border: none;
            padding: 12px 16px;
        }
        .alert-danger {
            background: rgba(220, 53, 69, 0.15);
            color: #ff6b7a;
            border: 1px solid rgba(220, 53, 69, 0.2);
        }
        .alert-success {
            background: rgba(40, 167, 69, 0.15);
            color: #5eda7c;
            border: 1px solid rgba(40, 167, 69, 0.2);
        }
        .alert-warning {
            background: rgba(255, 193, 7, 0.15);
            color: #ffd95c;
            border: 1px solid rgba(255, 193, 7, 0.2);
        }
        .alert-info {
            background: rgba(23, 162, 184, 0.15);
            color: #5cd9ef;
            border: 1px solid rgba(23, 162, 184, 0.2);
        }
        .setup-link {
            text-align: center;
            margin-top: 20px;
        }
        .setup-link a {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s;
        }
        .setup-link a:hover {
            color: #7c6cf0;
        }
        .logo-icon {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-icon svg {
            width: 48px;
            height: 48px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7c6cf0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        <h2>Admin Panel</h2>
        <p class="subtitle">Masuk untuk mengelola sistem</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_auth.login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Masukkan username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-login">Masuk</button>
        </form>

        <div class="setup-link">
            <a href="{{ url_for('admin_auth.initial_setup') }}">Setup awal →</a>
        </div>
    </div>
</body>
</html>
